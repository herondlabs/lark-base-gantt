<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Technology Roadmap</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#080D1A;
  --surface:#0F1629;
  --surface2:#162033;
  --border:#1E2D45;
  --border2:#253553;
  --text:#E2EBF6;
  --dim:#7A92B0;
  --faint:#3D5470;
  --today:#FF6B35;
}

body{
  font-family:'JetBrains Mono',monospace;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  font-size:12px;
}

/* ── Header ── */
.header{
  position:sticky;top:0;z-index:200;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:10px 20px;
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;
}
.header-title{
  font-family:'Syne',sans-serif;
  font-size:16px;font-weight:800;
  letter-spacing:.03em;white-space:nowrap;
}
.header-title span{color:#3B82F6}
.header-right{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
#legend{display:flex;gap:12px;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--dim)}
.leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
#count{font-size:10px;color:var(--faint);white-space:nowrap}
.btn{
  background:var(--surface2);
  border:1px solid var(--border);
  color:var(--dim);
  padding:5px 11px;border-radius:4px;
  cursor:pointer;
  font-family:'JetBrains Mono',monospace;
  font-size:10px;letter-spacing:.05em;
  transition:border-color .2s,color .2s;white-space:nowrap;
}
.btn:hover{border-color:#3B82F6;color:#3B82F6}

/* ── States ── */
.state{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  height:calc(100vh - 53px);gap:14px;
  color:var(--dim);font-size:12px;text-align:center;padding:20px;
}
.spinner{
  width:30px;height:30px;
  border:2px solid var(--border);
  border-top-color:#3B82F6;
  border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.error-icon{font-size:28px}
.empty{color:var(--dim);line-height:1.8}
.empty b{color:var(--text)}

/* ── Gantt wrapper ── */
#gantt{display:none;overflow:auto;height:calc(100vh - 53px)}
.gantt-wrap{min-width:900px}

/* ── Timeline header ── */
.tl-header{
  display:flex;
  position:sticky;top:0;z-index:100;
  background:var(--surface);
  border-bottom:1px solid var(--border2);
}
.row-lbl-hd{
  width:260px;min-width:260px;
  padding:6px 14px;
  font-size:9px;color:var(--faint);
  text-transform:uppercase;letter-spacing:.1em;
  border-right:1px solid var(--border2);
  display:flex;align-items:flex-end;
}
.tl-cols{flex:1;overflow:hidden}
.tl-quarters,.tl-months{display:flex}
.tl-q{
  font-size:9px;color:var(--dim);
  padding:4px 8px;
  border-right:1px solid var(--border2);
  text-transform:uppercase;letter-spacing:.07em;
  font-weight:600;
  border-bottom:1px solid var(--border);
}
.tl-m{
  flex:1;
  font-size:9px;color:var(--faint);
  padding:3px 0;text-align:center;
  border-right:1px solid var(--border);
}
.tl-m-now{color:var(--today)}

/* ── Group header ── */
.group-hd{
  display:flex;align-items:center;gap:8px;
  padding:7px 14px;
  background:var(--surface2);
  border-bottom:1px solid var(--border);
}
.group-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.group-name{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em}
.group-ct{font-size:9px;color:var(--faint)}

/* ── Item row ── */
.g-row{
  display:flex;align-items:center;
  border-bottom:1px solid var(--border);
  height:38px;
  transition:background .15s;
}
.g-row:hover{background:var(--surface2)}
.row-lbl{
  width:260px;min-width:260px;
  height:100%;
  padding:0 14px;
  border-right:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
  overflow:hidden;
}
.row-name{
  flex:1;font-size:11px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.row-owner{font-size:10px;color:var(--faint);white-space:nowrap}

/* ── Bar area ── */
.bar-area{
  flex:1;position:relative;height:100%;
  display:flex;overflow:hidden;
}
.grid-col{
  flex:1;height:100%;
  border-right:1px solid var(--border);
  flex-shrink:0;
}
.grid-col-q{border-right-color:var(--border2)}
.today-line{
  position:absolute;top:0;bottom:0;
  width:1px;background:var(--today);
  pointer-events:none;z-index:10;
}
.bar{
  position:absolute;top:50%;
  transform:translateY(-50%);
  height:20px;border-radius:3px;
  display:flex;align-items:center;
  padding:0 7px;
  cursor:pointer;
  transition:filter .15s;
  min-width:4px;
  overflow:hidden;
}
.bar:hover{filter:brightness(1.25);z-index:20}
.bar-label{
  font-size:9px;
  color:rgba(255,255,255,.9);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  pointer-events:none;
}

/* ── Tooltip ── */
#tooltip{
  position:fixed;display:none;
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:6px;padding:12px;
  font-size:11px;color:var(--text);
  pointer-events:none;z-index:1000;
  width:220px;
  box-shadow:0 8px 28px rgba(0,0,0,.5);
}
.tt-title{font-weight:600;font-size:12px;margin-bottom:9px;line-height:1.3}
.tt-row{display:flex;gap:8px;margin-bottom:5px;align-items:center}
.tt-lbl{color:var(--faint);min-width:64px;font-size:10px}
.tt-badge{font-size:9px;padding:1px 6px;border-radius:3px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border2)}

/* ── Fullscreen fallback ── */
body.fullscreen-fallback{
  position:fixed;top:0;left:0;right:0;bottom:0;
  z-index:9999;width:100vw;height:100vh;
  overflow:auto;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-title"><span>TECHNOLOGY ROADMAP</span></div>
  <div class="header-right">
    <div id="legend"></div>
    <span id="count"></span>
    <button class="btn" onclick="refresh()">↻ REFRESH</button>
    <button class="btn" onclick="toggleFullscreen()">⛶ FULLSCREEN</button>
  </div>
</div>

<div class="state" id="loading">
  <div class="spinner"></div>
  <span>Loading roadmap data…</span>
</div>

<div class="state" id="error" style="display:none">
  <div class="error-icon">⚠</div>
  <span id="error-msg" style="max-width:80vw;word-break:break-word;white-space:pre-wrap;font-size:10px;text-align:left">Failed to load data</span>
  <button class="btn" onclick="refresh()">Try again</button>
</div>

<div id="gantt"></div>
<div id="tooltip"></div>

<script>
<!-- BUNDLE -->
</script>
</body>
</html>
